schema_version: 1
fields:
  id:
    type: string
    profile: minimal
    author: ai
  type:
    type: string
    profile: minimal
    author: ai
  version:
    type: integer
    profile: minimal
    author: ai
  status:
    type: enum[draft, reviewed, accepted, stale, superseded, provisional]
    profile: minimal
    author: ai
  depends_on:
    type: list[ref]
    profile: minimal
    author: ai
  elicited_from:
    type: list[ref]
    profile: minimal
    author: ai
  decided_by:
    type: enum[human, ai-drafted/human-reviewed]
    profile: minimal
    author: ai
  summary:
    type: text
    profile: minimal
    author: ai
    in_summary: true
  created:
    type: date
    profile: minimal
    author: ai
  updated:
    type: date
    profile: minimal
    author: ai
  inherited:
    # FR-60: true only on an artifact copied into a run by `kagami run
    # fork` — whatever `decided_by` this artifact carries was decided in
    # the parent run, not this one. Absent/false on every normally
    # created artifact. `profile: full`, not minimal — never required for
    # `validate_minimal_profile`'s completeness check (FR-16); a normal
    # artifact legitimately never sets it.
    type: boolean
    profile: full
    author: ai
